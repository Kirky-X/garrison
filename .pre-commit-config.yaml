# Pre-commit hooks for Bulwark
# Usage: pip install pre-commit && pre-commit install
repos:
  # === 通用检查 ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^docs/.*\.md$'
      - id: end-of-file-fixer
        exclude: '^docs/.*\.md$'
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '^docs/archive/'
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-executables-have-shebangs
      - id: debug-statements

  # === Rust 格式化 ===
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: [--, --check]
        pass_filenames: false
      - id: clippy
        args: [--all-features, --, -D, warnings]
        pass_filenames: false

  # === cargo-deny（许可证 / 漏洞 / 禁用源 / 重复依赖） ===
  - repo: local
    hooks:
      - id: cargo-deny
        name: cargo deny check (license/advisory/ban)
        entry: >-
          bash -c 'cargo deny check 2>/dev/null || { echo "run: cargo install cargo-deny && cargo deny init"; exit 1; }'
        language: system
        files: 'Cargo\.(toml|lock)'
        pass_filenames: false

  # === 拼写检查 ===
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        exclude: '^(docs/archive|temp|vendor)/.*$'
        args: ['--ignore-words-list=crate,BU,aNULL', --check-filenames]

  # === Markdown 检查（仅检查 Bulwark 文档，跳过 archive/temp） ===
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        args: [--disable=MD013,--disable=MD024,--disable=MD033]
        exclude: '^(docs/archive|temp)/.*$'

# 全局配置
default_language_version:
  python: python3
default_stages: [commit]
minimum_pre_commit_version: "3.0.0"
