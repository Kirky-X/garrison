# Pre-commit hooks for Garrison
# Usage: pip install pre-commit && pre-commit install
repos:
  # === 通用检查 ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^docs/.*\.md$'
      - id: end-of-file-fixer
        exclude: '^docs/.*\.md$'
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: '^docs/archive/'
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-executables-have-shebangs
      - id: debug-statements

  # === 禁止提交 temp/ 第三方参考源码（防御级，阻断 git add -f 绕过 .gitignore） ===
  - repo: local
    hooks:
      - id: forbid-temp-dir
        name: forbid committing temp/ (第三方参考源码禁止入库)
        entry: >-
          bash -c 'staged=$(git diff --cached --name-only | grep "^temp/" || true);
          if [ -n "$staged" ]; then
          echo "❌ 禁止提交 temp/ 下的第三方参考源码："; echo "$staged";
          echo "temp/ 已在 .gitignore 忽略；若确需入库请评审后调整 .gitignore 与本 hook。"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

  # === Rust 格式化 ===
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: [--, --check]
        pass_filenames: false

  # === Rust clippy（db-sqlite 与 db-postgres 互斥，分两次检查） ===
  - repo: local
    hooks:
      - id: clippy-db-sqlite
        name: clippy (db-sqlite + full features)
        entry: cargo clippy --features full -- -D warnings
        language: system
        pass_filenames: false
        files: '^src/|^garrison-macros/src/|^Cargo.toml$'
      - id: clippy-db-postgres
        name: clippy (db-postgres + production features)
        entry: cargo clippy --features production -- -D warnings
        language: system
        pass_filenames: false
        files: '^src/|^garrison-macros/src/|^Cargo.toml$'

  # === cargo-deny（许可证 / 漏洞 / 禁用源 / 重复依赖） ===
  - repo: local
    hooks:
      - id: cargo-deny
        name: cargo deny check (license/advisory/ban)
        entry: >-
          bash -c 'cargo deny check 2>/dev/null || { echo "run: cargo install cargo-deny && cargo deny init"; exit 1; }'
        language: system
        files: 'Cargo\.(toml|lock)'
        pass_filenames: false

  # === 密钥扫描（gitleaks，与 detect-private-key 互补） ===
  # 使用系统安装的 gitleaks 二进制（避免 pre-commit 从 GitHub 下载时的网络依赖）
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (system binary)
        entry: gitleaks protect --staged --config .gitleaks.toml
        language: system
        pass_filenames: false

  # === 拼写检查 ===
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        exclude: '^(docs/archive|temp|vendor)/.*$'
        args: ['--ignore-words-list=crate,BU,aNULL', --check-filenames]

  # === Markdown 检查（仅检查 Garrison 文档，跳过 archive/temp） ===
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.1
    hooks:
      - id: markdownlint
        args: [--disable=MD013,--disable=MD024,--disable=MD033]
        exclude: '^(docs/archive|temp|\.github|mdbook/src/SUMMARY\.md)(/.*)?$'

# 全局配置
default_language_version:
  python: python3
default_stages: [commit]
minimum_pre_commit_version: "3.0.0"
