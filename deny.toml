# cargo-deny 配置 — `cargo deny check` 按此校验 漏洞/许可证/禁用源/重复依赖。
# 完整字段见: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
# rsa 0.9.x 有 RUSTSEC-2023-0071（Marvin Attack 定时侧信道），但目前无 patched 版本。
# bulwark 在 social-alipay feature 中使用 RSA 签名（SigningKey/Signer），不使用解密功能。
# Marvin Attack 针对 RSA 解密操作的时序侧信道，签名操作不受影响，漏洞不可达。
# 另外 rsa 也作为 dev-dependency 用于 keycloak-oidc 测试生成 RSA 密钥对。
# 官方状态：No patch available（截至 2026-07-13），显式忽略此 advisory。
# 参考: https://rustsec.org/advisories/RUSTSEC-2023-0071
#
# crossbeam-epoch 0.9.18 有 RUSTSEC-2026-0204（fmt::Display 在 null pointer 上触发无效解引用）。
# 依赖链：bulwark → moka → crossbeam-epoch（transitive，无法直接升级）。
# 影响：仅在 null pointer 上调用 fmt::Display 时 panic（非 memory safety），无 patched 版本。
# 参考: https://rustsec.org/advisories/RUSTSEC-2026-0204
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0204",
]

[licenses]
# 允许的宽松许可证；新增非宽松许可证需在此放行
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause", "BSD-2-Clause", "ISC",
    "Unicode-3.0", "Unicode-DFS-2016",
    "Zlib", "CC0-1.0", "MPL-2.0",
    # limiteron non-optional 后，oxcache/core 透传引入：
    "BSL-1.0",                # xxhash-rust (via redis → oxcache/core)，OSI/FSF 认可
    "CDLA-Permissive-2.0",    # webpki-root-certs (via reqwest → opentelemetry-otlp → oxcache/core/minimal/metrics)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
