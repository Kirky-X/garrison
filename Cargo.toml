# Bulwark - 身份认证鉴权框架
# oxcache 与 dbnexus 均使用 crates.io 发布版本（owner: Kirky-X）。

[package]
name = "bulwark"
version = "0.4.2"
edition = "2021"
rust-version = "1.85"  # MSRV: 部分 deps（如 inventory 0.3）要求 edition2024 → Rust 1.85+
authors = ["Kirky.X"]
license = "Apache-2.0"
description = "Bulwark - 面向 Rust 生态的身份认证鉴权框架，借鉴 Sa-Token v1.45.0 设计"
homepage = "https://github.com/Kirky-X/bulwark"
repository = "https://github.com/Kirky-X/bulwark"
documentation = "https://docs.rs/bulwark"
readme = "README.md"
keywords = ["auth", "authentication", "authorization", "jwt", "rbac"]
categories = ["authentication", "web-programming"]

[workspace]
members = [".", "examples", "bulwark-macros"]
resolver = "2"

[lib]
name = "bulwark"
path = "src/lib.rs"

[dependencies]
# === Required dependencies ===
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.0"
tokio = { version = "1", features = ["sync", "macros", "rt-multi-thread", "time"] }
once_cell = "1.19"
inventory = "0.3"
thiserror = "2.0"
tracing = "0.1.43"
async-trait = "0.1"
parking_lot = "0.12"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
# http: 框架无关的 HeaderMap/HeaderName/HeaderValue，供 tenant.rs TenantResolver 使用
# （actix/warp/axum 均基于 http crate，加为直接 dep 不增加构建开销）
http = "1"

# === Optional dependencies (feature-gated) ===
axum = { version = "0.8", optional = true, default-features = false, features = ["json"] }
actix-web = { version = "4", optional = true, default-features = false }
warp = { version = "0.4", optional = true, default-features = false }
jsonwebtoken = { version = "10", optional = true, default-features = false, features = ["rust_crypto"] }
reqwest = { version = "0.13", optional = true, default-features = false, features = ["json", "rustls", "rustls-native-certs", "form"] }
totp-rs = { version = "5", optional = true }
sha2 = { version = "0.11", optional = true }
hmac = { version = "0.13", optional = true }
base64 = { version = "0.22", optional = true }
md5 = { version = "0.7", optional = true }
base32 = { version = "0.5", optional = true }
# 0.4.2 新增：密码哈希（argon2 0.5 + bcrypt 0.15），依据 spec secure-password
# rand 用于生成 argon2 盐（OsRng），argon2 0.5 的 rand feature 依赖 rand 0.8
argon2 = { version = "0.5", optional = true }
bcrypt = { version = "0.15", optional = true }
rand = { version = "0.8", optional = true }
# oxcache 0.3: L1 (moka) + L2 (redis) 两级缓存，默认 full features，0.3 支持 per-entry TTL + ttl() 查询
# 使用本地 path 依赖（crates.io 0.3.0 未暴露 Cache<K,V>::ttl()，本地仓库已暴露）
oxcache = { path = "/home/kirky/projects/oxcache", optional = true }
# dbnexus 0.2: 默认 sqlite + permission + sql-parser + macros + config-env + with-time
# auto-migrate feature 由 db-sqlite feature 显式启用（提供 MigrationExecutor::run_migrations）
dbnexus = { version = "0.2", optional = true }
# sea-orm: Repository 层参数化查询依赖（Statement/Value/ConnectionTrait）。
# 版本与 dbnexus 0.2 一致，由 db-sqlite feature 启用。
# dbnexus 未 re-export Statement/Value/ConnectionTrait，需显式声明为直接依赖。
sea-orm = { version = "2.0.0-rc.37", default-features = false, features = ["sqlx-sqlite", "runtime-tokio-rustls"], optional = true }
prometheus = { version = "0.14", optional = true }
# 可观测性：tracing-subscriber 用于 JSON 日志，opentelemetry 用于分布式追踪
tracing-subscriber = { version = "0.3", optional = true, features = ["fmt", "json", "env-filter"] }
opentelemetry = { version = "0.30", optional = true, default-features = false, features = ["trace"] }
opentelemetry_sdk = { version = "0.30", optional = true, default-features = false, features = ["trace", "rt-tokio"] }
opentelemetry-otlp = { version = "0.30", optional = true, default-features = false, features = ["trace", "grpc-tonic"] }
# tracing-opentelemetry 桥接 tracing span 与 OpenTelemetry trace
tracing-opentelemetry = { version = "0.31", optional = true, default-features = false }
# tonic 用于 gRPC interceptor（feature = "grpc"），需 transport feature 以启用 Interceptor trait
tonic = { version = "0.13", optional = true, default-features = false, features = ["transport"] }
# fluent-rs 用于异常消息 i18n（feature = "i18n"），支持中英文切换
fluent = { version = "0.17", optional = true, default-features = false }
# unic-langid 用于构造 LanguageIdentifier（fluent-rs 内部依赖，显式声明以直接使用）
unic-langid = { version = "0.9", optional = true, default-features = false }
# bulwark-macros 提供 #[check_login]/#[check_permission]/#[check_role] 过程宏
# （feature = "annotation-macros"，依赖 web-axum 以使用 IntoResponse）
bulwark-macros = { path = "bulwark-macros", version = "0.4.2", optional = true }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.15"
tempfile = "3.27"
# serial_test 用于串行化依赖 std::env::set_var 的测试，避免多线程并发污染环境变量
serial_test = "3"
# sea-orm 用于 dbnexus 集成测试的查询验证（版本与 dbnexus 0.2 一致）
sea-orm = { version = "2.0.0-rc.37", default-features = false, features = ["sqlx-sqlite", "runtime-tokio-rustls"] }
# tower 用于 axum 集成测试（oneshot Request）
tower = { version = "0.5", default-features = false, features = ["util"] }
# http-body-util 用于 axum 测试中的 body 读取
http-body-util = "0.1"
# wiremock 用于 OAuth2/SSO 集成测试的 HTTP mock（0.2.0 新增）
wiremock = "0.6"
# warp test feature 仅在测试时启用 warp::test 模块（不影响生产构建）
warp = { version = "0.4", default-features = false, features = ["test"] }
# base64 用于 OIDC 测试中解析 JWT header 段（与 protocol-sign 使用的 base64 0.22 版本一致）
base64 = "0.22"

[features]
default = []

# === 核心模块（always on，无开关） ===
# core / stp / annotation / router / dao / strategy / session / config / context / json / exception / manager / plugin
# 这些模块无 feature flag，总是编译

# === 核心扩展：决策溯源（0.5.0 新增，依据 spec decision-trace） ===
# 启用后 PermissionChecker::authorize 的实现者可填充 checked_permissions / matched_roles / trace_id 字段。
# 不启用时这三字段为空 vec/None，仅保留 allowed 与 reason（性能优先）。
decision-trace = []

# === 核心扩展：多租户逻辑隔离（0.5.0 新增，依据 spec tenant-isolation） ===
# 启用后 BulwarkDaoOxcache 的 set/get/delete 在 TENANT task_local 上下文存在时
# 自动为 key prepend `tenant:{tid}:` 前缀，实现缓存层租户隔离。
# 注意：Repository SQL 过滤不门控此 feature（始终生效，安全优先）。
tenant-isolation = []

# === 聚合特性：等价于原 default，方便快速启用全部默认后端 ===
all-defaults = ["cache-memory", "db-sqlite", "web-axum"]

# === 缓存后端（通过 oxcache 0.2，默认 full 包含 L1 moka + L2 redis） ===
# cache-memory 与 cache-redis 均启用 oxcache（语义别名，区分用途）
cache-memory = ["oxcache"]
cache-redis = ["oxcache"]
# 注意：oxcache 无 caffeine feature（L1 用 moka），cache-caffeine 已移除

# === 数据库后端（通过 dbnexus 0.2） ===
# dbnexus 默认启用 sqlite + permission + sql-parser + macros + config-env
# db-sqlite 启用 auto-migrate 以支持 BulwarkMigration::run_migrations
# db-sqlite 同时启用 sea-orm 以支持 Repository 层参数化查询（Statement/Value/ConnectionTrait）
db-sqlite = ["dbnexus", "dbnexus/auto-migrate", "sea-orm"]
# 注意：dbnexus 0.2 未暴露 postgres/mysql features，以下标注为 0.2.0+ 待 dbnexus 添加
# db-postgres = ["dbnexus", "dbnexus/postgres"]  # TODO: 0.2.0+
# db-mysql = ["dbnexus", "dbnexus/mysql"]  # TODO: 0.2.0+

# === 协议层插件 ===
# 0.4.2 新增：PKCE (RFC 7636) 需要 sha2 (S256) + base64 (URL_SAFE_NO_PAD)
protocol-oauth2 = ["reqwest", "sha2", "base64"]
protocol-sso = ["reqwest"]
protocol-jwt = ["jsonwebtoken", "sha2"]
protocol-sign = ["sha2", "hmac", "base64"]
protocol-apikey = []
protocol-temp = []
# 0.4.0 新增：OIDC 扩展（id_token 签发/验证 + discovery endpoint），依赖 protocol-jwt + protocol-oauth2
protocol-oidc = ["protocol-jwt", "protocol-oauth2"]
# 0.4.0 新增：OAuth2 Scope Handler 注册表（ScopeHandler trait + ScopeRegistry），依赖 protocol-oauth2
oauth2-scope-handler = ["protocol-oauth2"]
# 0.4.0 新增：SSO Server 独立抽象（SsoServer trait + CenterIdConverter + SsoChannel），依赖 protocol-sso
protocol-sso-server = ["protocol-sso"]

# === 安全模块 ===
secure-totp = ["totp-rs", "base32"]
secure-sign = ["sha2", "hmac", "base64", "md5"]
secure-httpbasic = ["base64"]
secure-httpdigest = ["sha2", "base64", "md5"]
# 0.4.2 新增：密码哈希（argon2 + bcrypt），依据 spec secure-password
secure-password = ["dep:argon2", "dep:bcrypt", "dep:rand"]

# === Web 框架适配 ===
web-axum = ["axum", "axum/tokio", "axum/http1"]
web-actix = ["actix-web"]
web-warp = ["warp"]

# === 0.4.2 新增：过程宏注解（#[check_login]/#[check_permission]/#[check_role]） ===
# 依赖 web-axum（宏生成的 wrapper 返回 axum::response::Response）
annotation-macros = ["dep:bulwark-macros", "web-axum"]

# === 0.4.0 新增扩展 ===
# alone-cache：多 Redis 实例隔离（AloneCache 装饰器 + AloneCacheManager），无额外依赖
alone-cache = []
# parameter-query：参数化查询机制（ParameterQuery trait + Builder + async），无额外依赖
parameter-query = []

# === 可观测性 ===
listener = []
tracing-log = ["tracing/log"]
metrics-prometheus = ["prometheus", "tracing-subscriber"]
# OpenTelemetry 分布式追踪（OTLP gRPC 导出），独立门控以隔离重依赖
observability-otlp = ["opentelemetry", "opentelemetry_sdk", "opentelemetry-otlp", "tracing-opentelemetry", "tracing-subscriber"]
# gRPC 鉴权拦截器（tonic::Interceptor 实现）
grpc = ["tonic"]
# 异常消息国际化（中英文切换，fluent-rs）
i18n = ["fluent", "unic-langid"]

# === 聚合特性 ===
full = [
    "cache-memory", "cache-redis",
    "db-sqlite",
    "protocol-oauth2", "protocol-sso", "protocol-jwt", "protocol-sign", "protocol-apikey", "protocol-temp",
    "protocol-oidc", "oauth2-scope-handler", "protocol-sso-server",
    "secure-totp", "secure-sign", "secure-httpbasic", "secure-httpdigest", "secure-password",
    "web-axum", "web-actix", "web-warp",
    "alone-cache", "parameter-query",
    "listener", "metrics-prometheus", "observability-otlp", "grpc", "i18n",
    "annotation-macros",
    "decision-trace", "tenant-isolation",
]

# 注意：production 原用 db-postgres，但 dbnexus 0.2 不支持，0.1.0 降级为 db-sqlite
production = [
    "cache-redis", "db-sqlite", "web-axum",
    "protocol-jwt", "protocol-sign", "secure-sign",
    "listener", "tracing-log", "metrics-prometheus",
    "tenant-isolation",
]

development = [
    "cache-memory", "db-sqlite", "web-axum",
]

# === 示例文件已迁移为独立 workspace member（examples/） ===
# 详见 examples/Cargo.toml，可通过 `cargo run -p bulwark-examples --bin <name> --features full` 运行

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
