name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # === 基础检查：默认特性 ===
  check-default:
    name: Check (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Check
        run: cargo check --no-default-features --features "default"
      - name: Check (default + dev)
        run: cargo check --no-default-features --features "default"
      - name: Build
        run: cargo build --no-default-features --features "default"

  # === 全特性检查 ===
  check-full:
    name: Check (full features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Check (full)
        run: cargo check --features "full"
      - name: Build (full)
        run: cargo build --features "full"

  # === 格式化检查 ===
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # === Clippy ===
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
        with:
          components: clippy
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Clippy (default)
        run: cargo clippy --no-default-features --features "default" -- -D warnings
      - name: Clippy (full)
        run: cargo clippy --features "full" -- -D warnings

  # === 测试矩阵 ===
  test:
    name: Test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.85, stable, beta]
        exclude:
          - os: windows-latest
            rust: beta
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@${{ matrix.rust }}  # nosemgrep
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Test (default)
        run: cargo test --no-default-features --features "default" --lib
      - name: Test (full)
        run: cargo test --features "full" --lib

  # === 文档构建 ===
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Build docs
        run: cargo doc --no-deps --features "full"
      - name: Check broken links
        run: |
          cargo install cargo-deadlinks 2>/dev/null || true
          cargo deadlinks --dir target/doc/bulwark || true

  # === 安全审计 ===
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # === 覆盖率（仅 Linux） ===
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85  # nosemgrep
      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c  # v2.7.7
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --features "full" --out Lcov --output-dir coverage
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97  # v4.6.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
