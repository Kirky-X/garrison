name: CI

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # === 基础检查：默认特性（default = backend-embedded） ===
  # sdforge build script 需要 protoc；用 taiki-e/install-action 跨平台统一安装（SHA pin 防供应链攻击）
  check-default:
    name: Check (default = backend-embedded)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
        with:
          components: rustfmt, clippy
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-default-deps
      - name: Check (default features)
        run: cargo check
      - name: Build (default features)
        run: cargo build

  # === 全特性检查 ===
  check-full:
    name: Check (full features)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
        with:
          components: rustfmt, clippy
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-full-deps
      - name: Check (full)
        run: cargo check --features "full"
      - name: Build (full)
        run: cargo build --features "full"

  # === 格式化检查 ===
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # === Clippy ===
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
        with:
          components: clippy
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-full-deps
      - name: Clippy (default)
        run: cargo clippy --no-default-features --features "default" -- -D warnings
      - name: Clippy (full)
        run: cargo clippy --features "full" -- -D warnings

  # === 测试矩阵 ===
  # GitHub Actions 限制：uses 字段不能使用 matrix 上下文（解析期未展开 matrix）
  # 因此固定使用 1.85.1 SHA pin，通过 with.toolchain 参数切换实际工具链版本
  # protoc 用 taiki-e/install-action 跨平台统一安装（Linux/macOS/Windows 均支持）
  test:
    name: Test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [1.85, stable, beta]
        exclude:
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-test-deps-${{ matrix.rust }}
      - name: Test (default)
        run: cargo test --no-default-features --features "default" --lib
      - name: Test (full)
        run: cargo test --features "full" --lib

  # === 文档构建 ===
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-full-deps
      - name: Build docs
        run: cargo doc --no-deps --features "full"
      - name: Install cargo-deadlinks
        uses: taiki-e/install-action@9989d3780211b30eb48fda71262a571e03b00a25 # cargo-deadlinks
      # 死链检查（显性化策略 — 规则 12：不掩盖，分类处理）
      #
      # 根因分析（2026-07-21）：死链全部来自外部 crate trait 的 blanket impl：
      #   - `Context` ← opentelemetry::FutureExt::with_context doc 中的 [`Context`] intra-doc link
      #   - `dispatcher` ← tracing_subscriber::WithSubscriber doc 中的 [default subscriber] reference link
      #   - `Response` ← warp::Reply::into_response doc 中的 [`Response`] intra-doc link
      # rustdoc 在 `--no-deps` 模式下无法解析这些外部 intra-doc link，生成相对路径 → 死链。
      # 切换 nightly + `--extern-html-root-url` 可修复，但项目用 stable Rust 1.85。
      #
      # 处理策略：
      #   1. 过滤已知外部 crate 死链（Context/dispatcher/Response）— 不阻断 CI
      #   2. 新死链（garrison 自身 doc comment 问题）— 阻断 CI
      # 这样移除 continue-on-error，让死链检查成为真实门禁，同时不掩盖已知外部问题。
      - name: Check broken links
        run: |
          set -euo pipefail
          OUTPUT=$(cargo deadlinks --dir target/doc/garrison 2>&1 || true)
          echo "$OUTPUT"
          # 过滤已知外部 crate 死链（opentelemetry Context / tracing-subscriber dispatcher / warp Response）
          # 精确匹配路径片段边界（/ 或 . 分隔），避免误过滤 TenantContext/GarrisonResponse 等自身类型
          # - `config/Context does not exist` ← opentelemetry::FutureExt blanket impl
          # - `config/dispatcher does not exist` ← tracing_subscriber::WithSubscriber blanket impl
          # - `error/type.Response.html does not exist` ← warp::Reply::into_response blanket impl
          NEW_DEADLINKS=$(echo "$OUTPUT" | grep "does not exist" | grep -vE "[/.](Context|dispatcher|Response)(\.html)? does not exist" || true)
          if [ -n "$NEW_DEADLINKS" ]; then
            echo "❌ Found new deadlinks (not from external crate trait impls):"
            echo "$NEW_DEADLINKS"
            exit 1
          else
            echo "✅ No new deadlinks. Known external-crate deadlinks (Context/dispatcher/Response) filtered."
          fi

  # === cargo-deny（漏洞 / 许可证 / 禁用源 / 重复依赖） ===
  # cargo-deny 已覆盖 cargo-audit 的漏洞检查功能，且配置统一在 deny.toml 管理。
  # 删除独立 audit job，避免维护两份忽略列表（audit.toml + deny.toml）。
  # cargo-deny-action 会自动生成 Cargo.lock（库 crate 不提交 Cargo.lock）
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          arguments: --all-features

  # === 集成测试（tests/ 目录，仅 Linux + MSRV） ===
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-full-deps
      - name: Integration tests (full features)
        # 用 --tests 而非 --test '*'：--test '*' 会显式展开所有 [[test]] target，
        # 遇到 required-features 不满足的（如 db_mysql_testcontainers 需要 db-mysql）会报错。
        # --tests 自动跳过 required-features 不满足的 test target。
        # db_mysql_testcontainers 需要 Docker + testcontainers 拉 MySQL 镜像，本地手动跑。
        run: cargo test --features "full" --tests --no-fail-fast

  # === 覆盖率（仅 Linux） ===
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85.1, nosemgrep
      - name: Install protoc (sdforge build dep)
        uses: taiki-e/install-action@d5b1c57492c40991d5b03b58d85d06c3626b7542 # protoc
      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          shared-key: ci-full-deps
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ea361d59ff285fa3ab7cc40dcba421e91017d586 # cargo-llvm-cov
      - name: Run coverage (fail under 80% lines)
        run: cargo llvm-cov --features "full" --fail-under-lines 80 --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lcov.info
