version: 2
updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    reviewers: ["kirky"]
    cooldown:
      default-days: 7
    groups:
      patch:
        update-types: ["patch"]
      minor:
        update-types: ["minor"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    reviewers: ["kirky"]
    cooldown:
      default-days: 7

  # pre-commit hooks
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "tooling"]
    cooldown:
      default-days: 7
