version: 2
updates:
  # Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    reviewers: ["kirky"]
    cooldown:
      default-days: 7
    groups:
      patch:
        update-types: ["patch"]
      minor:
        update-types: ["minor"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    reviewers: ["kirky"]
    cooldown:
      default-days: 7
    # 将 CI action 更新合并为单个 PR，减少分支满天（避免每个 action 各开一个分支/PR）
    groups:
      github-actions:
        patterns: ["*"]

  # pre-commit hooks
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "tooling"]
    cooldown:
      default-days: 7
